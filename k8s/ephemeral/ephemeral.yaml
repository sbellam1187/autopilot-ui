apiVersion: runway.aa.com/v1alpha2
kind: Ephemeral
metadata:
  name: autopilot-ephemeral
  annotations:
    enableCloudIngress: "true"
    backstageName: autopilot-ui
  labels:
    app-id: autopilot-ui-nonprod
    runway.aa.com/aa-app-shortname: APIMgmtGQL
    data-classification: nonpci
    environment: nonprod
spec:
  repo: autopilot-ui
  maxEphemerals: 10
  maxDaysWithoutUpdate: 5
  template:
    containerName: docker.aa.com/nonprod/autopilot-ui
    containerTag: placeholder
    port: 3000
    healthCheck:
      endpoint: /
      enabled: False
      port: 3000
    reachableServices:
      - autopilot-agents-nonprod.autopilot-nonprod.svc.cluster.local
    secretProviders:
      - vault:
          vaultNamespace: automation/apimgmtgql-autopilotnp-p
          secretEngineMount: secrets
          secretPath: ephemeral
    env:
      - name: NEXTAUTH_URL
        value: https://{{ .Context.EphemeralName }}.cloud.aa.com
